<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OASIS game</title>
<meta name="apple-mobile-web-app-title" content="OASIS">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/style-extra.css">
</head>
<body>

<div id="stage">

  <!-- ============================================================
       通用容器说明：
       每个 .screen 对应一类UI外观，具体内容（文案/选项/数据）
       由 js/nodes.js 里每个节点的 render() 函数动态填入。
       不要在这里为新节点添加新的 .screen 容器 —— 先检查这14个
       通用容器能否覆盖，绝大多数情况下都可以复用。
       ============================================================ -->

  <!-- 0. 语言选择页（整个游戏最先出现的页面，纯白背景，选完才进登录页） -->
  <div class="screen" id="screen-lang-select">
    <div class="lang-select-panel">
      <div class="lang-select-title">Choose your language<br>请选择语言</div>
      <div class="lang-select-btns">
        <button type="button" class="lang-select-btn" id="lang-select-en" data-lang="en">English</button>
        <button type="button" class="lang-select-btn" id="lang-select-zh" data-lang="zh">中文</button>
      </div>
    </div>
  </div>

  <!-- 1. 登录页（仅出现一次，结构保留静态） -->
  <div class="screen" id="screen-login">
    <div class="login-panel">
      <div class="login-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="login-prompt" id="login-prompt" data-en="Enter your user name" data-zh="请输入用户名">Enter your user name</div>
      <input type="text" class="login-input" id="username-input" data-en-placeholder="User name" data-zh-placeholder="用户名" placeholder="User name" autocomplete="off">
      <div class="login-error" id="login-error" data-en="Please enter your user name before proceeding" data-zh="请先输入用户名再继续">Please enter your user name before proceeding</div>
      <button class="login-btn" id="login-btn" data-en="Log In" data-zh="登录">Log In</button>
    </div>
  </div>

  <!-- 2. 电脑主屏幕（高频复用：每次"返回桌面查看新通知"都用这个） -->
  <div class="screen" id="screen-desktop">
    <div id="desktop-notif-slot"></div>
    <div class="desktop-time">
      <div class="t" id="desktop-time-big">9:41</div>
      <div class="d" id="desktop-date">Nov 8, 2032</div>
    </div>
    <div class="app-grid" id="desktop-app-grid"></div>
    <div class="dock" id="desktop-dock"></div>
  </div>

  <!-- 3. 邮件 app -->
  <div class="screen" id="screen-mail">
    <div class="back-btn" id="mail-back-btn">‹ Desktop</div>
    <div class="mail-app">
      <div class="mail-list" id="mail-list"></div>
      <div class="mail-detail" id="mail-detail"></div>
    </div>
  </div>

  <!-- 4. friends 信息流 -->
  <div class="screen" id="screen-social-feed">
    <div class="back-btn" id="social-back-btn">‹ Desktop</div>
    <div class="friends-scroll-wrap" id="friends-scroll-wrap">
      <div class="friends-header">Friends</div>
      <div class="stories-row" id="stories-row"></div>
      <div class="feed" id="friends-feed"></div>
    </div>
  </div>

  <!-- 5. story 播放页 -->
  <div class="screen" id="screen-story">
    <div class="story-progress-row" id="story-progress-row"></div>
    <div class="story-top-info" id="story-top-info">
      <div class="story-top-avatar" id="story-top-avatar"></div>
      <div class="story-top-name" id="story-top-name"></div>
    </div>
    <div class="back-btn" id="story-close" style="top:48px; right:10px; left:auto; color:#fff; background:rgba(0,0,0,0.35);">✕</div>
    <div class="story-content" id="story-content"></div>
    <div class="story-tap-zones">
      <div id="story-prev"></div>
      <div id="story-next"></div>
    </div>
  </div>

  <!-- 6. 个人主页（shawn/debs 共用） -->
  <div class="screen" id="screen-profile">
    <div class="back-btn" id="profile-back-btn">‹ Friends</div>
    <div class="profile-scroll-wrap" id="profile-scroll-wrap">
      <div class="profile-header" id="profile-header"></div>
      <div class="profile-grid" id="profile-grid"></div>
    </div>
  </div>

  <!-- 7. 聊天界面（高频复用：shawn/debs/ruth/amber） -->
  <div class="screen" id="screen-chat">
    <div class="chat-header">
      <div class="back-btn" id="chat-back-btn" style="position:static; padding:0; background:transparent; backdrop-filter:none; -webkit-backdrop-filter:none; border-radius:0;">‹</div>
      <div class="chat-header-avatar" id="chat-header-avatar"></div>
      <div class="chat-header-name" id="chat-header-name"></div>
    </div>
    <div class="chat-body" id="chat-body"></div>
    <div class="chat-end-bar hide" id="chat-end-bar"></div>
    <div class="chat-input-row" id="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="Message...">
      <button class="chat-send" id="chat-send">➤</button>
    </div>
    <div class="chat-options-row hide" id="chat-options-row"></div>
  </div>

  <!-- 8. 文档类页面（NDA/用户协议/合同条款；OASIS app登录/面板也复用这个容器） -->
  <div class="screen" id="screen-document">
    <div class="back-btn" id="document-back-btn">‹ Back</div>
    <div class="document-wrap" id="document-wrap"></div>
  </div>

  <!-- 9. 数据可视化页（oasis平台数据） -->
  <div class="screen" id="screen-dataviz">
    <div class="back-btn" id="dataviz-back-btn">‹ Back</div>
    <div class="dataviz-wrap" id="dataviz-wrap"></div>
  </div>

  <!-- 10. 终端/日志/解谜页（防火墙规则编辑器等） -->
  <div class="screen" id="screen-terminal">
    <div class="back-btn hide" id="terminal-back-btn">‹ Back</div>
    <div class="terminal-wrap" id="terminal-wrap"></div>
  </div>

  <!-- 11. 抉择点页 -->
  <div class="screen" id="screen-choice">
    <div class="choice-wrap" id="choice-wrap"></div>
  </div>

  <!-- 12. 纯文字过场页 -->
  <div class="screen" id="screen-narrative">
    <div class="narrative-wrap" id="narrative-wrap"></div>
  </div>

  <!-- 13. 结局画面 -->
  <div class="screen" id="screen-ending">
    <div class="ending-wrap" id="ending-wrap"></div>
  </div>

  <!-- 14. 结局收集面板 -->
  <div class="screen" id="screen-collection">
    <div class="collection-wrap" id="collection-wrap"></div>
  </div>

  <!-- 15. 营销页/官网类页面（可滚动，用于OASIS官网等）-->
  <div class="screen" id="screen-website">
    <div class="back-btn" id="website-back-btn">‹ Back</div>
    <div class="website-wrap" id="website-wrap"></div>
  </div>

  <!-- 16. 日历app（月历网格 + 生日倒计时） -->
  <div class="screen" id="screen-calendar">
    <div class="back-btn" id="calendar-back-btn">‹ Back</div>
    <div class="calendar-wrap" id="calendar-wrap"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/state.js"></script>
<script src="js/engine.js"></script>
<script src="js/helpers.js"></script>
<script src="js/characters.js"></script>
<script src="js/nodes.js"></script>
<script src="js/nodes.zh.js"></script>
<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
</body>
</html>
